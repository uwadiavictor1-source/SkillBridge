<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Jobs - SkillBridge</title>
  <link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <nav class="navbar">
      <a href="index.html" class="logo"><i class="fas fa-bridge"></i> SkillBridge</a>
      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="jobs.html">Jobs</a>
        <a href="profile.html">Profile</a>
      </div>
    </nav>

    <h2><i class="fas fa-clipboard-list"></i> My Posted Jobs</h2>
    <div id="myJobsList" class="grid-3"></div>

    <footer>
      <p>&copy; 2025 SkillBridge</p>
    </footer>
  </div>

  <script type="module">
    import { db } from './js/firebase-config.js';
    import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    
    const userId = localStorage.getItem('userId');
    if (!userId) window.location.href = 'login.html';
    
    async function loadMyJobs() {
      const q = query(collection(db, "jobs"), where("clientId", "==", userId));
      const snapshot = await getDocs(q);
      const container = document.getElementById('myJobsList');
      
      if (snapshot.empty) {
        container.innerHTML = '<div class="card">You haven\'t posted any jobs yet. <a href="post-job.html">Post your first job</a></div>';
        return;
      }
      
      container.innerHTML = '';
      snapshot.forEach(doc => {
        const job = doc.data();
        container.innerHTML += `
          <div class="card">
            <h3>${job.title}</h3>
            <p>${job.description.substring(0, 100)}...</p>
            <div class="job-meta">
              <span class="badge">$${job.budget}</span>
              <span class="badge">${job.location || 'Remote'}</span>
              <span class="badge">${job.status || 'open'}</span>
            </div>
            <a href="job-details.html?id=${doc.id}" class="btn-secondary" style="margin-top: 1rem; display: inline-block;">View Bids</a>
          </div>
        `;
      });
    }
    
    loadMyJobs();
  </script>
</body>
</html>
