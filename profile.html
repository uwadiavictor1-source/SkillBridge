<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - SkillBridge</title>
  <link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <nav class="navbar">
      <a href="index.html" class="logo"><i class="fas fa-bridge"></i> SkillBridge</a>
      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="jobs.html">Jobs</a>
        <a href="messages.html">Messages</a>
        <a href="profile.html">Profile</a>
      </div>
    </nav>

    <div class="form-container animate-fade">
      <h2><i class="fas fa-user-edit"></i> Edit Profile</h2>
      <form id="profileForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name">
        </div>
        <div class="form-group">
          <label>Skills (comma separated)</label>
          <input type="text" id="skills" placeholder="React, Python, UI Design">
        </div>
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="location" placeholder="City, Country">
        </div>
        <div class="form-group">
          <label>Hourly Rate (USD)</label>
          <input type="number" id="rate" placeholder="50">
        </div>
        <div class="form-group">
          <label>Bio</label>
          <textarea id="bio" rows="4" placeholder="Tell us about yourself and your experience..."></textarea>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%;"><i class="fas fa-save"></i> Save Changes</button>
      </form>
    </div>

    <footer>
      <p>&copy; 2025 SkillBridge</p>
    </footer>
  </div>

  <script type="module">
    import { db } from './js/firebase-config.js';
    import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    
    const userId = localStorage.getItem('userId');
    if (!userId) window.location.href = 'login.html';
    
    const userRef = doc(db, "users", userId);
    
    async function loadProfile() {
      const docSnap = await getDoc(userRef);
      if (docSnap.exists()) {
        const data = docSnap.data();
        document.getElementById('name').value = data.name || '';
        document.getElementById('skills').value = data.skills || '';
        document.getElementById('location').value = data.location || '';
        document.getElementById('rate').value = data.rate || '';
        document.getElementById('bio').value = data.bio || '';
      }
    }
    
    loadProfile();
    
    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      await updateDoc(userRef, {
        name: document.getElementById('name').value,
        skills: document.getElementById('skills').value,
        location: document.getElementById('location').value,
        rate: parseInt(document.getElementById('rate').value) || 0,
        bio: document.getElementById('bio').value,
        updatedAt: new Date().toISOString()
      });
      alert('Profile updated successfully!');
    });
  </script>
</body>
</html>
