<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reviews - SkillBridge</title>
  <link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .review-card {
      background: white;
      border-radius: 24px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .rating {
      color: #fbbf24;
      margin: 0.5rem 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="navbar">
      <a href="index.html" class="logo"><i class="fas fa-bridge"></i> SkillBridge</a>
      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="jobs.html">Jobs</a>
        <a href="profile.html">Profile</a>
      </div>
    </nav>

    <h2><i class="fas fa-star"></i> Client Reviews</h2>
    <div id="reviewsList"></div>

    <div class="form-container">
      <h3>Leave a Review</h3>
      <form id="reviewForm">
        <div class="form-group">
          <label>Rating</label>
          <select id="rating">
            <option value="5">★★★★★ (5)</option>
            <option value="4">★★★★☆ (4)</option>
            <option value="3">★★★☆☆ (3)</option>
            <option value="2">★★☆☆☆ (2)</option>
            <option value="1">★☆☆☆☆ (1)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Your Review</label>
          <textarea id="comment" rows="4" placeholder="Share your experience..."></textarea>
        </div>
        <button type="submit" class="btn-primary"><i class="fas fa-paper-plane"></i> Submit Review</button>
      </form>
    </div>

    <footer>
      <p>&copy; 2025 SkillBridge</p>
    </footer>
  </div>

  <script type="module">
    import { db } from './js/firebase-config.js';
    import { collection, addDoc, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    
    const userId = localStorage.getItem('userId');
    
    async function loadReviews() {
      const q = query(collection(db, "reviews"), orderBy("createdAt", "desc"));
      const snapshot = await getDocs(q);
      const container = document.getElementById('reviewsList');
      
      if (snapshot.empty) {
        container.innerHTML = '<div class="card">No reviews yet. Be the first!</div>';
        return;
      }
      
      container.innerHTML = '';
      snapshot.forEach(doc => {
        const review = doc.data();
        container.innerHTML += `
          <div class="review-card">
            <strong>${review.reviewerName || 'Anonymous'}</strong>
            <div class="rating">${'★'.repeat(review.rating)}${'☆'.repeat(5-review.rating)}</div>
            <p>${review.comment}</p>
            <small>${new Date(review.createdAt).toLocaleDateString()}</small>
          </div>
        `;
      });
    }
    
    loadReviews();
    
    document.getElementById('reviewForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!userId) {
        alert('Please login to leave a review');
        window.location.href = 'login.html';
        return;
      }
      
      await addDoc(collection(db, "reviews"), {
        rating: parseInt(document.getElementById('rating').value),
        comment: document.getElementById('comment').value,
        reviewerId: userId,
        reviewerName: 'User',
        createdAt: new Date().toISOString()
      });
      alert('Review submitted!');
      document.getElementById('reviewForm').reset();
      loadReviews();
    });
  </script>
</body>
</html>
