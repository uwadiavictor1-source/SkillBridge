<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SkillBridge</title>
  <link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <nav class="navbar">
      <a href="index.html" class="logo"><i class="fas fa-bridge"></i> SkillBridge</a>
      <div class="nav-links">
        <a href="jobs.html">Browse Jobs</a>
        <a href="signup.html">Sign Up</a>
      </div>
    </nav>

    <div class="form-container animate-fade">
      <h2><i class="fas fa-sign-in-alt"></i> Welcome Back</h2>
      <form id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <div id="loginError" style="color: #dc2626; margin-bottom: 1rem; display: none;"></div>
        <button type="submit" class="btn-primary" style="width: 100%;">
          <i class="fas fa-arrow-right"></i> Login
        </button>
      </form>
      <p style="text-align: center; margin-top: 1.5rem;">
        Don't have an account? <a href="signup.html" style="color: #1e5bbf;">Sign up</a>
      </p>
    </div>

    <footer>
      <p>&copy; 2025 SkillBridge</p>
    </footer>
  </div>

  <script type="module">
    import { auth } from './js/firebase-config.js';
    import { 
      signInWithEmailAndPassword, 
      setPersistence, 
      browserLocalPersistence 
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    
    const loginForm = document.getElementById('loginForm');
    const errorDiv = document.getElementById('loginError');
    
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const submitBtn = loginForm.querySelector('button[type="submit"]');
      
      // Disable button and show loading
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
      errorDiv.style.display = 'none';
      
      try {
        // Set persistence to LOCAL first
        await setPersistence(auth, browserLocalPersistence);
        
        // Then sign in
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        
        // Store user info
        localStorage.setItem('userId', userCredential.user.uid);
        
        // Redirect to dashboard
        window.location.href = 'dashboard.html';
        
      } catch (error) {
        console.error("Login error:", error);
        errorDiv.textContent = getErrorMessage(error.code);
        errorDiv.style.display = 'block';
        
        // Reset button
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-arrow-right"></i> Login';
      }
    });
    
    function getErrorMessage(errorCode) {
      switch (errorCode) {
        case 'auth/invalid-email':
          return 'Invalid email address.';
        case 'auth/user-disabled':
          return 'This account has been disabled.';
        case 'auth/user-not-found':
          return 'No account found with this email.';
        case 'auth/wrong-password':
          return 'Incorrect password.';
        case 'auth/too-many-requests':
          return 'Too many failed attempts. Please try again later.';
        default:
          return 'Login failed. Please check your credentials and try again.';
      }
    }
  </script>
</body>
</html>
