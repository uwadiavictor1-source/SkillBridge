<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - SkillBridge</title>
  <link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <nav class="navbar">
      <a href="index.html" class="logo"><i class="fas fa-bridge"></i> SkillBridge</a>
      <div class="nav-links">
        <a href="jobs.html">Browse Jobs</a>
        <a href="login.html">Login</a>
      </div>
    </nav>

    <div class="form-container animate-fade">
      <h2><i class="fas fa-user-plus"></i> Create Account</h2>
      <form id="signupForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required placeholder="At least 6 characters" minlength="6">
        </div>
        <div class="form-group">
          <label>I am a:</label>
          <div class="role-selector" style="display: flex; gap: 2rem; padding: 0.5rem 0;">
            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
              <input type="radio" name="role" value="client" checked> 
              <i class="fas fa-briefcase"></i> Client (Hire)
            </label>
            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
              <input type="radio" name="role" value="freelancer"> 
              <i class="fas fa-laptop-code"></i> Freelancer (Work)
            </label>
          </div>
        </div>
        <div id="signupError" style="color: #dc2626; margin-bottom: 1rem; display: none;"></div>
        <button type="submit" class="btn-primary" style="width: 100%;">
          <i class="fas fa-check-circle"></i> Sign Up
        </button>
      </form>
      <p style="text-align: center; margin-top: 1.5rem;">
        Already have an account? <a href="login.html" style="color: #1e5bbf;">Login</a>
      </p>
    </div>

    <footer>
      <p>&copy; 2025 SkillBridge</p>
    </footer>
  </div>

  <script type="module">
    import { auth, db } from './js/firebase-config.js';
    import { createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    
    const signupForm = document.getElementById('signupForm');
    const errorDiv = document.getElementById('signupError');
    
    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const role = document.querySelector('input[name="role"]:checked').value;
      
      const submitBtn = signupForm.querySelector('button[type="submit"]');
      
      // Validate
      if (password.length < 6) {
        errorDiv.textContent = 'Password must be at least 6 characters';
        errorDiv.style.display = 'block';
        return;
      }
      
      // Disable button
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
      errorDiv.style.display = 'none';
      
      try {
        // Create user in Firebase Auth
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        // Update profile with name
        await updateProfile(user, {
          displayName: name
        });
        
        // Create user document in Firestore with role
        const userData = {
          name: name,
          email: email,
          role: role, // 'client' or 'freelancer'
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString(),
          // Role-specific defaults
          ...(role === 'freelancer' ? {
            skills: '',
            rate: 0,
            bio: '',
            location: ''
          } : {
            company: '',
            totalSpent: 0,
            jobsPosted: 0
          })
        };
        
        await setDoc(doc(db, "users", user.uid), userData);
        
        // Store in localStorage
        localStorage.setItem('userId', user.uid);
        localStorage.setItem('userRole', role);
        localStorage.setItem('userName', name);
        
        // Redirect to dashboard
        window.location.href = 'dashboard.html';
        
      } catch (error) {
        console.error("Signup error:", error);
        
        let errorMessage = 'Signup failed. Please try again.';
        
        switch (error.code) {
          case 'auth/email-already-in-use':
            errorMessage = 'This email is already registered. Please login instead.';
            break;
          case 'auth/invalid-email':
            errorMessage = 'Please enter a valid email address.';
            break;
          case 'auth/weak-password':
            errorMessage = 'Password is too weak. Please use at least 6 characters.';
            break;
          default:
            errorMessage = error.message;
        }
        
        errorDiv.textContent = errorMessage;
        errorDiv.style.display = 'block';
        
        // Reset button
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> Sign Up';
      }
    });
  </script>
</body>
</html>
