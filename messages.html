<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages - SkillBridge</title>
  <link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .chat-container {
      background: white;
      border-radius: 32px;
      overflow: hidden;
      margin: 2rem 0;
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
    }
    .chat-header {
      background: #1e5bbf;
      color: white;
      padding: 1rem 1.5rem;
    }
    .chat-messages {
      height: 500px;
      overflow-y: auto;
      padding: 1.5rem;
      background: #f8fafc;
    }
    .message {
      margin-bottom: 1rem;
      display: flex;
      flex-direction: column;
    }
    .message.sent {
      align-items: flex-end;
    }
    .message.received {
      align-items: flex-start;
    }
    .message-bubble {
      max-width: 70%;
      padding: 0.75rem 1.25rem;
      border-radius: 20px;
      background: white;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .message.sent .message-bubble {
      background: #1e5bbf;
      color: white;
    }
    .message-time {
      font-size: 0.7rem;
      color: #6b7280;
      margin-top: 0.25rem;
    }
    .chat-input {
      display: flex;
      padding: 1rem;
      background: white;
      border-top: 1px solid #e2e8f0;
    }
    .chat-input input {
      flex: 1;
      margin-right: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="navbar">
      <a href="index.html" class="logo"><i class="fas fa-bridge"></i> SkillBridge</a>
      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="jobs.html">Jobs</a>
        <a href="messages.html">Messages</a>
        <a href="profile.html">Profile</a>
      </div>
    </nav>

    <div class="chat-container animate-fade">
      <div class="chat-header">
        <i class="fas fa-comments"></i> Live Chat
      </div>
      <div id="chatMessages" class="chat-messages">
        <div style="text-align: center; color: #6b7280;">Loading messages...</div>
      </div>
      <div class="chat-input">
        <input type="text" id="messageInput" placeholder="Type your message...">
        <button class="btn-primary" id="sendBtn"><i class="fas fa-paper-plane"></i> Send</button>
      </div>
    </div>

    <footer>
      <p>&copy; 2025 SkillBridge</p>
    </footer>
  </div>

  <script type="module">
    import { db, auth } from './js/firebase-config.js';
    import { collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    
    const userId = localStorage.getItem('userId');
    if (!userId) window.location.href = 'login.html';
    
    const messagesRef = collection(db, "messages");
    const q = query(messagesRef, orderBy("timestamp", "asc"));
    
    const chatDiv = document.getElementById('chatMessages');
    
    onSnapshot(q, (snapshot) => {
      chatDiv.innerHTML = '';
      snapshot.forEach(doc => {
        const msg = doc.data();
        const isSent = msg.senderId === userId;
        chatDiv.innerHTML += `
          <div class="message ${isSent ? 'sent' : 'received'}">
            <div class="message-bubble">
              <strong>${msg.senderName || 'User'}</strong><br>
              ${msg.text}
            </div>
            <div class="message-time">${new Date(msg.timestamp?.toDate()).toLocaleTimeString()}</div>
          </div>
        `;
      });
      chatDiv.scrollTop = chatDiv.scrollHeight;
    });
    
    document.getElementById('sendBtn').addEventListener('click', async () => {
      const input = document.getElementById('messageInput');
      if (!input.value.trim()) return;
      
      await addDoc(messagesRef, {
        text: input.value,
        senderId: userId,
        senderName: "You",
        timestamp: serverTimestamp()
      });
      input.value = '';
    });
  </script>
</body>
</html>
